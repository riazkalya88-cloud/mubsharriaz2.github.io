<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mubshar Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#1e21d6ef



}

/* MAIN CARD */
.card{
width:360px;
background:rgb(248, 246, 246);
backdrop-filter:blur(10px);
padding:35px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
text-align:center;
animation:fade 0.8s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

/* AVATAR */
.avatar{
width:100px;
height:100px;
margin:0 auto;
border-radius:50%;
overflow:hidden;
border:4px solid white;
box-shadow:0 10px 20px rgb(0, 0, 0);
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT */
h2{
margin:10px 0;
color:#0d6efd;
}

.name{
font-size:14px;
color:#fd00be;
margin-bottom:15px;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
outline:none;
font-size:14px;
}

input:focus{
border-color:#0d6efd;
}

/* PASSWORD BOX */
.pass{
position:relative;
}

.pass span{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
}

/* OPTIONS */
.options{
display:flex;
justify-content:space-between;
font-size:12px;
margin-top:5px;
}

.options a{
text-decoration:none;
color:#0004ff;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#fa0606;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0a0505de;
}

/* FOOTER */
.footer{
margin-top:15px;
font-size:12px;
color:#000000;
}
</style>
</head>

<body>

<div class="card">

<div class="avatar">
    <img src="mubshar.jpg.png" alt="Mubshar">
</div>

<h1> Login </h1>

<div class="name">
 ɪᴛꜱ꧁ᴹᴿᴷ꧂
</div> 

<input type="text" placeholder="Username">

<div class="pass">
<input type="password" id="pass" placeholder="Password">
<span onclick="toggle()">👁️</span>
</div>

<div class="options">
<label><input type="checkbox"> Remember</label>
<a href="#">Forgot Password</a>
</div>

<button onclick="login()">Login</button>

<div class="footer">
Made by ❤️ <b>MRK</b>
</div>

</div>

<script>
function toggle(){
let p = document.getElementById("pass");
p.type = (p.type === "password") ? "text" : "password";
}

function login(){
alert("Welcome My Login 🚀");
}
</script>

</body>
</html>
